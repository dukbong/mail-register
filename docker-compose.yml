services:
  n8n:
    build: .
    restart: unless-stopped
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./mail-sender:/mail-sender
      - ./shared:/shared
    environment:
      - GENERIC_TIMEZONE=Asia/Seoul
      - TZ=Asia/Seoul
      - NODE_FUNCTION_ALLOW_BUILTIN=fs
      - NODES_EXCLUDE=[]

volumes:
  n8n_data:
